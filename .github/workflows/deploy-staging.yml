# Deploy to Staging
# Triggers on push to develop branch

name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  # ==========================================
  # Run CI Checks First
  # ==========================================
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # ==========================================
  # Deploy to Staging
  # ==========================================
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run Prisma migrations on staging
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy to Railway Staging
        id: deploy
        run: |
          railway link --environment staging
          railway up --detach
          echo "url=$(railway status --json | jq -r '.deploymentUrl')" >> $GITHUB_OUTPUT
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ==========================================
  # Smoke Tests
  # ==========================================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            ${{ needs.deploy.outputs.url }}/health

      - name: GraphQL endpoint check
        run: |
          curl --fail --retry 3 --retry-delay 5 \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"query":"{ __typename }"}' \
            ${{ needs.deploy.outputs.url }}/graphql
