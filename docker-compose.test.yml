# Docker Compose for E2E Testing in CI/CD
# Provides isolated PostgreSQL database for tests

services:
  # Test PostgreSQL database
  test-db:
    image: postgres:16-alpine
    container_name: graphql-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: graphql_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data # Use tmpfs for faster tests

  # Run tests
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: graphql-test-runner
    depends_on:
      test-db:
        condition: service_healthy
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@test-db:5432/graphql_test?schema=public
      SKIP_PRISMA_CONNECT: 'false'
      BETTER_AUTH_SECRET: test-secret-for-ci-testing-only-32chars
      BETTER_AUTH_URL: http://localhost:3001
      UPSTASH_REDIS_REST_URL: mock://localhost
      UPSTASH_REDIS_REST_TOKEN: mock-token
    command: >
      sh -c "
        pnpm prisma migrate deploy &&
        pnpm test:e2e
      "
    volumes:
      - ./test:/app/test:ro
      - ./src:/app/src:ro
